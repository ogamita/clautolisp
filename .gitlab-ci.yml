variables:
  CLAUTOLISP_CI_IMAGE: $CI_REGISTRY_IMAGE/clautolisp-ci
  CLAUTOLISP_CI_LATEST: $CI_REGISTRY_IMAGE/clautolisp-ci:latest
  # Foreign-arch base images, pinned to their per-arch MANIFEST DIGEST.
  # GitLab Runner 19.1's docker executor ignores `[runners.docker] platform`,
  # so a plain `buildpack-deps:bookworm` would be pulled as amd64. Pinning the
  # arm sub-manifest digest makes the daemon pull that exact (single-platform)
  # image, which then runs under host binfmt/qemu-user-static. Refresh with:
  #   docker manifest inspect buildpack-deps:bookworm \
  #     | jq -r '.manifests[]|select(.platform.architecture=="arm64" or
  #              (.platform.architecture=="arm" and .platform.variant=="v7"))
  #              |"\(.platform.architecture)\(.platform.variant//"") \(.digest)"'
  ARM64_BASE: "buildpack-deps@sha256:22e6f90b138866051d4209b774fe28813483a8b67b431b4cb6475176ebe06a86"
  ARMV7_BASE: "buildpack-deps@sha256:b7e46ca6d5b66b2e56275cd8b319bfc87355efad36b4b089601c771674b79b4e"

default:
  image: $CLAUTOLISP_CI_LATEST
  # Runners are selected by CONFIGURATION tags: <os>,<arch>,<executor>
  # (+ capability tags like gui/bricscad/autocad where a job needs them).
  # The linux/amd64 work runs in the CI image on the self-hosted poseidon
  # group runner (ogamita-linux-docker, tags linux,amd64,docker; poseidon
  # is the always-on Linux compute box). Jobs needing another platform
  # override `tags:` — arm64/macOS → thalassa, windows → the windows PC
  # (both intermittent laptops, so their tagged jobs queue until the host
  # is online, e.g. when a branch is pushed for validation). Instance
  # (shared) runners are disabled for this project.
  tags: [linux, amd64, docker]

stages:
  - build
  - test
  - release
  - collect
  - deploy

# Build the CI image with kaniko — NO Docker daemon, NO privileged, NO
# socket exposure. The poseidon group runner is rootless docker
# (privileged=false), so a docker:dind service cannot start (it would fail
# with "Cannot connect to the Docker daemon at tcp://docker:2375"). kaniko
# builds the image inside the job container and pushes straight to the
# GitLab registry — the same approach the bocl project uses.
build:clautolisp-ci-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  # Transient network failures (e.g. the CCL download from GitHub) should
  # not fail a whole pipeline run.
  retry: 2
  rules:
    # Never rebuild the image on a release tag: use the already-published
    # :latest. (Otherwise a flaky image build blocks the release stage.)
    - if: '$CI_COMMIT_TAG'
      when: never
    - changes:
        - .gitlab-ci.yml
        - Makefile
        - clautolisp/Makefile
        - clautolisp/clautolisp.asd
        - clautolisp/docker/Dockerfile
      when: on_success
    - when: never
  script:
    - |
      mkdir -p /kaniko/.docker
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
      # :$CI_COMMIT_SHA always; :latest only on the default branch.
      DESTS="--destination $CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && DESTS="$DESTS --destination $CLAUTOLISP_CI_LATEST"
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/clautolisp/docker/Dockerfile" \
        $DESTS \
        --cache=true \
        --cache-repo "$CLAUTOLISP_CI_IMAGE/cache"

# The clautolisp/autolisp-debug subsystem depends on bordeaux-threads
# (added in the debugger merge). The Docker image's Quicklisp install
# fetches it on demand but the SBCL run that follows must run *with*
# the install dir on its load path. Pre-warm it here so make
# test-sbcl's --non-interactive run finds it without a recursive
# quickload prompt.
.pre-warm-quicklisp-sbcl: &pre-warm-quicklisp-sbcl
  - sbcl --noinform --no-userinit --non-interactive
         --load /root/quicklisp/setup.lisp
         --eval '(ql:quickload (list "fiveam" "bordeaux-threads" "trivial-gray-streams" "babel" "alexandria") :silent t)'

.pre-warm-quicklisp-ccl: &pre-warm-quicklisp-ccl
  - ccl --no-init -b
        -e '(load "/root/quicklisp/setup.lisp")'
        -e '(ql:quickload (list "fiveam" "bordeaux-threads" "trivial-gray-streams" "babel" "alexandria") :silent t)'
        -e '(ccl:quit)'

test:clautolisp:sbcl:
  stage: test
  script:
    - *pre-warm-quicklisp-sbcl
    - make -C clautolisp test-sbcl

test:clautolisp:ccl:
  stage: test
  script:
    - *pre-warm-quicklisp-ccl
    - make -C clautolisp test-ccl

test:clautolisp:file-compat:sbcl:
  stage: test
  script:
    - mkdir -p clautolisp/.artifacts
    - make -C clautolisp run-file-compat-sbcl FILE_COMPAT_ARGS="--tag builtin --report-format json --output .artifacts/file-compat-sbcl.json"
    - cat clautolisp/.artifacts/file-compat-sbcl.json
  artifacts:
    when: always
    paths:
      - clautolisp/.artifacts/file-compat-sbcl.json

test:clautolisp:file-compat:ccl:
  stage: test
  script:
    - mkdir -p clautolisp/.artifacts
    - make -C clautolisp run-file-compat-ccl FILE_COMPAT_ARGS="--tag builtin --report-format json --output .artifacts/file-compat-ccl.json"
    - cat clautolisp/.artifacts/file-compat-ccl.json
  artifacts:
    when: always
    paths:
      - clautolisp/.artifacts/file-compat-ccl.json

# ---------------------------------------------------------------------
# autolisp-test + alfe lanes — parity with the GitHub Actions workflow
# (.github/workflows/ci.yml). GitLab CI ran a narrower matrix until
# now (clautolisp-only); the autolisp-front-end / autolisp-test lanes
# only existed on GitHub, which is why a clutch of fresh-checkout
# bugs (cache key, save-image dir, --dry-run engine probe) sailed
# through GitLab's pipeline while breaking on GitHub. Adding them
# here keeps both CIs symmetrical.

test:autolisp-test:sbcl:
  stage: test
  script:
    - make -C autolisp-test test

test:alfe:sbcl:
  stage: test
  script:
    - make -C autolisp-front-end test-sbcl

test:alfe:ccl:
  stage: test
  script:
    - make -C autolisp-front-end test-ccl

test:alfe:conformance:
  stage: test
  script:
    - make -C autolisp-front-end conformance

test:alfe:spec-coverage:
  stage: test
  script:
    - make -C autolisp-front-end check-spec-coverage

# Mirror of the GitHub `alfe-binary` job: build alfe-sbcl, assert
# its --version matches the source-declared version, smoke-test the
# headline `--clautolisp -x '(princ (+ 1 2))'` invocation, and
# publish the binary as a GitLab artifact for downstream consumers.
#
# NOTE: alfe -x does NOT auto-print its expression value (see
# issues/closed/doc-x-output-semantics.issue) — the smoke test
# wraps in (princ ...) explicitly. The --no-init flag suppresses
# user / system init-file output so the captured stdout is just
# the (princ) value.
build:alfe:sbcl:
  stage: test
  script:
    - make -C autolisp-front-end build-alfe-sbcl
    - |
      declared=$(sed -n 's/.*\*version\* "\([^"]*\)".*/\1/p' \
                     autolisp-front-end/tools/alfe/source/version.lisp)
      actual=$(autolisp-front-end/tools/alfe/bin/alfe-sbcl --version)
      echo "declared: $declared"
      echo "actual:   $actual"
      [ "$actual" = "alfe $declared" ]
    - |
      output=$(autolisp-front-end/tools/alfe/bin/alfe-sbcl \
                 --no-init --clautolisp -x '(princ (+ 1 2))')
      echo "output: $output"
      [ "$output" = "3" ]
  artifacts:
    when: always
    paths:
      - autolisp-front-end/tools/alfe/bin/alfe-sbcl
    expire_in: 14 days

# --- Release artefacts (see issues/open/release-artefacts.issue) -------
#
# On a version tag, produce the source / documentation / programs /
# libraries artefacts. The ogamita-group runner on poseidon + CI image
# cover Linux x86-64 only; the other five SBCL targets need dedicated runners
# (macOS, Windows, arm64) and are tracked in the issue — the GitHub
# Actions release workflow scaffolds the full 6-target matrix.

# --- Release artefacts (issues/open/release-artefacts.issue) -----------
#
# Per-target jobs build + package on a version tag (v* / clautolisp-v*),
# or manually. Runners are selected by configuration tags
# <os>,<arch>,<executor> (see documentation/self-hosted-runners.md):
#   [linux, amd64, docker]  -> poseidon  (always-on Linux compute box)
#   [linux, arm64, qemu]    -> poseidon  (arm64 via qemu-user emulation)
#   [linux, arm32, qemu]    -> poseidon  (arm32/armhf via qemu; for arm32 lanes)
#   [linux, arm64, docker]  -> thalassa  (NATIVE linux/arm64; optional validation)
#   [macos, arm64, shell]   -> thalassa  (native macOS build; intermittent)
#   [windows, amd64, shell] -> windows PC (intermittent)
# thalassa + windows are laptops with intermittent connectivity, so their
# tagged jobs queue until the host is online (e.g. on a validation push).
# arm64 targets are SBCL-only: Clozure CL has no arm64 build.
# Windows targets need a Windows runner (paid SaaS, or a Win11-ARM VM
# with its own runner) — not provided here yet.

.release-common:
  stage: release
  variables:
    GIT_SUBMODULE_STRATEGY: recursive   # libredwg (+ jsmn) needed by build-libraries
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(v|clautolisp-v)/'
      when: on_success
    - when: manual
      allow_failure: true
  # Cache the slow autolisp-spec paged split (3026 sections -> html/info/
  # pages); keyed on the spec org + the split driver.
  cache:
    key:
      files:
        - autolisp-spec/documentation/autolisp-visual-lisp-specification-draft.org
        - autolisp-spec/scripts/build-paged-spec.el
    paths:
      - autolisp-spec/build/
  artifacts:
    paths:
      - dist/
    expire_in: 30 days

release:linux:x86-64:
  extends: .release-common
  image: $CLAUTOLISP_CI_LATEST
  variables:
    RELEASE_LISPS: "sbcl ccl"     # x86-64 ships both SBCL + CCL (arm64 lanes stay sbcl-only by default)
  before_script:
    # bzip2 (tar -cjf) and zip are required by the release-* packaging;
    # cmake by build-libraries. Install whatever the image lacks (the CI
    # image gains them once it is rebuilt from master; this keeps tag
    # pipelines working in the meantime).
    - pkgs=""; for t in cmake bzip2 zip; do command -v $t >/dev/null 2>&1 || pkgs="$pkgs $t"; done; [ -z "$pkgs" ] || { apt-get update && apt-get install -y $pkgs; }
  script:
    - make release-sources
    - make build-libraries
    - make release-programs
    - make release-libraries
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-linux-x86-64"
    paths: [dist/]
    expire_in: 30 days

# Documentation is its OWN lane (mirrors the GitHub `documentation` job)
# so each forge independently produces the complete release set. It is
# slow (Emacs paged split of 3026 sections + xelatex PDFs across four
# subprojects) but platform-agnostic, so it runs on poseidon (the
# always-on Linux box) rather than the intermittent macOS laptop. The
# stock CI image is a Lisp image, so the before_script installs the doc
# toolchain — the SAME package set the GitHub `documentation` job uses
# (.github/workflows/release.yml). TODO: bake these into the CI image's
# Dockerfile to drop the per-run apt install.
release:documentation:
  extends: .release-common
  tags: [linux, amd64, docker]        # poseidon (always-on)
  image: $CLAUTOLISP_CI_LATEST
  variables:
    GIT_SUBMODULE_STRATEGY: none      # docs need no native submodule
  before_script:
    # Emacs (autolisp-spec paged split), TeX/xelatex (PDFs), makeinfo (Info).
    - apt-get update && apt-get install -y emacs-nox texlive texlive-latex-extra texlive-xetex texlive-plain-generic texinfo
    - command -v emacs makeinfo xelatex >/dev/null
  script:
    - make release-documentation
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-documentation"
    paths: [dist/]
    expire_in: 30 days

release:linux:arm64:
  extends: .release-common
  # poseidon (always-on) builds arm64 under qemu-user emulation. The base
  # image is pinned to its arm64 manifest digest ($ARM64_BASE) so the daemon
  # pulls the arm64 image (the runner `platform` key is ignored by
  # gitlab-runner 19.1); binfmt then runs it. thalassa's native
  # [linux,arm64,docker] runner is kept for optional native validation.
  tags: [linux, arm64, qemu]      # poseidon qemu (was thalassa native)
  image: $ARM64_BASE              # buildpack-deps bookworm, arm64 (digest-pinned)
  # Cache the libredwg cmake build dir so the slow (emulated) C compile is
  # reused across runs — cmake rebuilds only changed objects. Per-arch key
  # (objects are arch-specific). Interim measure (b); the durable fix (a) is
  # baking libredwg into a per-arch CI image. Bump -v2 to force a cold build.
  cache:
    key:
      prefix: libredwg-arm64-v1
      files:
        - .gitmodules
        - clautolisp/drawing-dwg/build-libredwg.sh
    paths:
      - clautolisp/third-party/libredwg/build/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends sbcl cmake m4
    - curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 -4 -o /tmp/ql.lisp https://beta.quicklisp.org/quicklisp.lisp
    - sbcl --non-interactive --load /tmp/ql.lisp --eval '(quicklisp-quickstart:install)'
  script:
    - make build-libraries          # vendored libdwg + shim (emulated arm64)
    - make build-programs           # SBCL arm64 images (no CCL on arm64)
    - make release-programs
    - make release-libraries
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-linux-arm64"
    paths: [dist/]
    expire_in: 30 days

# armv7 (32-bit ARM, Raspberry-Pi class) on poseidon under qemu. Unlike
# arm64, CCL HAS a 32-bit ARM build (its "linuxarm" release, binary
# `armcl`), so this lane exercises BOTH sbcl and ccl: SBCL armhf from apt,
# CCL from the v1.13 linuxarm tarball. NOTE: CCL under qemu-user emulation
# is less proven than SBCL; if armcl misbehaves the native fallback is a
# real armv7 host (e.g. a Raspberry Pi shell runner). The early `ccl`
# sanity invocation makes such a failure surface clearly.
release:linux:arm32:
  extends: .release-common
  tags: [linux, arm32, qemu]      # poseidon qemu
  image: $ARMV7_BASE              # buildpack-deps bookworm, armv7/armhf (digest-pinned)
  variables:
    RELEASE_LISPS: "sbcl ccl"     # armv7 ships both (CCL linuxarm = armcl)
  # Cache the libredwg cmake build dir (see arm64 lane) — the emulated armv7
  # C compile is the slowest step; reusing objects across runs is the (b)
  # time-saver until libredwg is baked into a per-arch CI image (a).
  cache:
    key:
      prefix: libredwg-arm32-v1
      files:
        - .gitmodules
        - clautolisp/drawing-dwg/build-libredwg.sh
    paths:
      - clautolisp/third-party/libredwg/build/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends sbcl cmake m4
    # CCL v1.13 32-bit ARM: the linuxarm tarball holds armcl/armcl.image at its
    # ROOT (no ccl/ prefix), so extract INTO /opt/ccl; `ccl` wrapper on PATH.
    - |
      curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 -4 \
           -o /tmp/linuxarm.tar.gz \
           https://github.com/Clozure/ccl/releases/download/v1.13/linuxarm.tar.gz
      mkdir -p /opt/ccl && tar -xzf /tmp/linuxarm.tar.gz -C /opt/ccl
      printf '%s\n' '#!/bin/sh' 'exec /opt/ccl/armcl "$@"' > /usr/local/bin/ccl
      chmod +x /usr/local/bin/ccl
      ccl --no-init --eval '(progn (format t "CCL ~a on ~a~%" (lisp-implementation-version) (machine-type)) (ccl:quit))'
    - curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 -4 -o /tmp/ql.lisp https://beta.quicklisp.org/quicklisp.lisp
    - sbcl --non-interactive --load /tmp/ql.lisp --eval '(quicklisp-quickstart:install)'
  script:
    - make build-libraries          # vendored libdwg + shim (armv7)
    - make build-programs           # loops RELEASE_LISPS -> build-sbcl + build-ccl
    - make release-programs
    - make release-libraries
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-linux-arm32"
    paths: [dist/]
    expire_in: 30 days

release:darwin:arm64:
  extends: .release-common
  tags: [macos, arm64, shell]     # thalassa (intermittent): native macOS arm64 build
  before_script:
    # The workstation provides the toolchain (MacPorts: sbcl, cmake; cc
    # via Xcode) and Quicklisp at ~/quicklisp/. SBCL-only on arm64.
    - command -v sbcl cmake cc >/dev/null
  script:
    - make build-libraries          # vendored libdwg + shim (native arm64)
    - make build-programs           # SBCL arm64 images
    - make release-programs
    - make release-libraries
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-darwin-arm64"
    paths: [dist/]
    expire_in: 30 days

# Windows x86-64 — STUB for now (real packaging follows
# documentation/windows-package-spec.md: SBCL/CCL images, libdwg.dll,
# and a zip into the Windows install root). This job only confirms the
# self-hosted Windows runner is reachable and reports its toolchain.
# Shell executor = PowerShell. No submodules needed for the stub.
release:windows:x86-64:
  extends: .release-common
  tags: [windows, amd64, shell]   # windows PC (intermittent): GUI bricscad/autocad host
  variables:
    GIT_SUBMODULE_STRATEGY: none
  script:
    - 'Write-Host "clautolisp $env:CI_COMMIT_TAG -- windows/x86-64 lane (STUB)"'
    - 'Write-Host "Toolchain probe:"'
    - 'foreach ($t in @("sbcl","cmake","git","cl","gcc")) { $c = Get-Command $t -ErrorAction SilentlyContinue; if ($c) { Write-Host ("  {0}: {1}" -f $t, $c.Source) } else { Write-Host ("  {0}: NOT FOUND" -f $t) } }'
    - 'New-Item -ItemType Directory -Force -Path dist | Out-Null'
    - '"clautolisp $env:CI_COMMIT_TAG windows/x86-64 packaging is a STUB. See documentation/windows-package-spec.md." | Set-Content -Encoding utf8 dist/windows-x86-64-STUB.txt'
    - 'Get-Content dist/windows-x86-64-STUB.txt'
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-windows-x86-64-stub"
    paths: [dist/]
    expire_in: 30 days

# --- collect: union the per-target artefacts into the combined set -----
#
# Gathers the per-target release jobs' dist/ (binaries-<os>-<arch>,
# libraries-<os>-<arch>, sources, documentation, windows) and unions
# them into the combined clautolisp-<ver>-{binaries,libraries}.tar.bz2
# (+ sources/documentation passthrough, windows kept as-is). Exposed as
# downloadable job artifacts only — publishing a GitLab Release is a
# separate, on-demand step taken AFTER the artefacts are tested.
collect:release:
  stage: collect
  # Just unions the per-target dist/ (tar/bzip2) — no platform-specific
  # toolchain needed, so run it on the always-on poseidon box rather than
  # waiting on the intermittent macOS laptop.
  tags: [linux, amd64, docker]
  image: $CLAUTOLISP_CI_LATEST
  variables:
    GIT_SUBMODULE_STRATEGY: none
  needs:
    - { job: "release:linux:x86-64", artifacts: true }
    - { job: "release:linux:arm64",  artifacts: true }
    - { job: "release:linux:arm32",  artifacts: true }
    - { job: "release:darwin:arm64", artifacts: true }
    - { job: "release:windows:x86-64", artifacts: true }
    - { job: "release:documentation", artifacts: true }
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(v|clautolisp-v)/'
      when: on_success
    - when: manual
      allow_failure: true
  before_script:
    # tar/make are in the CI image; install bzip2 if the image lacks it
    # (mirrors release:linux:x86-64's package-guard).
    - pkgs=""; for t in bzip2 tar make; do command -v $t >/dev/null 2>&1 || pkgs="$pkgs $t"; done; [ -z "$pkgs" ] || { apt-get update && apt-get install -y $pkgs; }
  script:
    - make collect-artefacts COLLECT_IN=dist COLLECT_OUT=dist/combined
  artifacts:
    name: "clautolisp-$CI_COMMIT_TAG-release"
    paths: [dist/combined/]
    expire_in: 30 days

# --- deploy: publish the spec HTML manual to the poseidon web site -----
#
# Takes release:documentation's artefact
# (dist/clautolisp-<ver>-documentation.tar.bz2), unpacks the prebuilt
# HTML manual it ships at  share/doc/autolisp-spec/html/  and rsyncs it
# over SSH onto the poseidon web root, publishing it at
#   http://poseidon.informatimago.com/ogamita/autolisp-spec/
#
# These HTML pages are BUILD OUTPUT ("object files") of the documentation
# job — they are deployed here, never committed. The poseidon web site is
# itself a git repo whose .gitignore excludes ogamita/autolisp-spec/ for
# exactly this reason.
#
# Runs on the poseidon group runner (linux,amd64,docker — a rootless
# docker executor on poseidon itself) and SSHes back to the host's sshd
# as the dedicated, least-privilege deploy account. Triggered on a version
# tag (after release:documentation succeeds) or manually.
#
# The deploy account's key is locked down with an rrsync forced command
# (command="rrsync .../ogamita/autolisp-spec",restrict in authorized_keys):
# the key can ONLY rsync into that one directory — no shell, no other path,
# no port/agent/X11 forwarding. So the remote target below is the empty
# path (rrsync chroots the session to the restricted dir) and there is no
# server-side mkdir step. See documentation/poseidon-deploy.md (the
# setup-deploy.sh helper provisions the account, dir and key).
#
# Required CI/CD variables (Settings > CI/CD > Variables — set them
# protected AND masked). Both are stored BASE64-ENCODED: a raw multi-line
# SSH key / known_hosts cannot be masked (GitLab rejects whitespace), but
# its single-line base64 can be. setup-deploy.sh prints the exact values.
# The job base64-decodes them (it works with value- or File-type vars):
#   DEPLOY_SSH_PRIVATE_KEY  base64 of the private key whose public half is
#                           the deploy account's rrsync authorized_keys entry
#   DEPLOY_KNOWN_HOSTS      base64 of `ssh-keyscan poseidon.informatimago.com`
# The non-secret host/account below are plain job variables; override in CI
# if they ever change.
deploy:documentation:
  stage: deploy
  image: $CLAUTOLISP_CI_LATEST
  tags: [linux, amd64, docker]        # poseidon (always-on); SSHes to its own sshd
  variables:
    GIT_STRATEGY: none                # nothing from the repo is needed — only the artefact
    DEPLOY_HOST: poseidon.informatimago.com
    DEPLOY_USER: clautolisp-deploy
    DEPLOY_URL: http://poseidon.informatimago.com/ogamita/autolisp-spec/
  needs:
    - { job: "release:documentation", artifacts: true }
  rules:
    - if: '$CI_COMMIT_TAG =~ /^(v|clautolisp-v)/'
      when: on_success
    - when: manual
      allow_failure: true
  before_script:
    # rsync + ssh client may be absent from the CI image; install if so.
    - need=""; command -v rsync >/dev/null 2>&1 || need="$need rsync"; command -v ssh >/dev/null 2>&1 || need="$need openssh-client"; [ -z "$need" ] || { apt-get update && apt-get install -y --no-install-recommends $need; }
  script:
    - set -eu
    # 1. Unpack the documentation artefact and locate the HTML manual.
    - tarball=$(ls dist/clautolisp-*-documentation.tar.bz2 | head -n1)
    - 'echo "deploying from: $tarball"'
    - stage=$(mktemp -d)
    - tar -C "$stage" -xjf "$tarball"
    - html="$stage/share/doc/autolisp-spec/html"
    - test -f "$html/index.html"   # fail loudly if the artefact layout changed
    # 2. Prepare an isolated SSH config. The secrets are base64 (so they can
    #    be masked); decode them. Accept value- or File-type variables.
    - install -d -m 700 ~/.ssh
    - if [ -f "$DEPLOY_SSH_PRIVATE_KEY" ]; then base64 -d "$DEPLOY_SSH_PRIVATE_KEY"; else printf '%s' "$DEPLOY_SSH_PRIVATE_KEY" | base64 -d; fi > ~/.ssh/id_deploy
    - if [ -f "$DEPLOY_KNOWN_HOSTS" ]; then base64 -d "$DEPLOY_KNOWN_HOSTS"; else printf '%s' "$DEPLOY_KNOWN_HOSTS" | base64 -d; fi > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/id_deploy ~/.ssh/known_hosts
    - 'SSH="ssh -i $HOME/.ssh/id_deploy -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"'
    # 3. Mirror the manual into the rrsync-restricted dir (empty remote path
    #    = the restricted root). --delete prunes pages dropped from a newer
    #    spec build; the dir is pre-provisioned by setup-deploy.sh.
    - rsync -rlptz --delete -e "$SSH" "$html/" "$DEPLOY_USER@$DEPLOY_HOST:"
    - 'echo "published to $DEPLOY_URL"'
  environment:
    name: poseidon/autolisp-spec
    url: http://poseidon.informatimago.com/ogamita/autolisp-spec/
