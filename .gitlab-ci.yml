variables:
  CLAUTOLISP_CI_IMAGE: $CI_REGISTRY_IMAGE/clautolisp-ci
  CLAUTOLISP_CI_PLATFORM: linux/amd64
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - test

.docker-job:
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

build:clautolisp-ci-image:
  stage: build
  extends: .docker-job
  script:
    - docker buildx create --use --name clautolisp-ci-builder || docker buildx use clautolisp-ci-builder
    - docker buildx inspect --bootstrap
    - |
      docker buildx build \
        --platform "$CLAUTOLISP_CI_PLATFORM" \
        --file clautolisp/docker/Dockerfile \
        --tag "$CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA" \
        $(if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then printf '%s' "--tag $CLAUTOLISP_CI_IMAGE:latest"; fi) \
        --push \
        .

test:clautolisp:sbcl:
  stage: test
  extends: .docker-job
  needs:
    - build:clautolisp-ci-image
  script:
    - docker pull "$CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA"
    - |
      docker run --rm \
        --platform "$CLAUTOLISP_CI_PLATFORM" \
        -v "$CI_PROJECT_DIR:/workspace" \
        -w /workspace \
        "$CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA" \
        make -C clautolisp test-sbcl

test:clautolisp:ccl:
  stage: test
  extends: .docker-job
  needs:
    - build:clautolisp-ci-image
  script:
    - docker pull "$CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA"
    - |
      docker run --rm \
        --platform "$CLAUTOLISP_CI_PLATFORM" \
        -v "$CI_PROJECT_DIR:/workspace" \
        -w /workspace \
        "$CLAUTOLISP_CI_IMAGE:$CI_COMMIT_SHA" \
        make -C clautolisp test-ccl
